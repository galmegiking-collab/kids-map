<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우리 동네 애 데리고 갈 데 🗺️</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif; background: #fff; }

/* 상단 검색 바 */
#topbar {
  position: absolute; top: 0; left: 0; right: 0; z-index: 10;
  background: #fff;
  border-bottom: 1px solid #eee;
  padding: 10px 12px 8px;
}

.search-row {
  display: flex; gap: 6px; align-items: center; margin-bottom: 8px;
}

#search-input {
  flex: 1; height: 38px; border: 1.5px solid #ddd; border-radius: 8px;
  padding: 0 12px; font-size: 14px; outline: none;
}
#search-input:focus { border-color: #4CAF82; }

#search-btn {
  height: 38px; padding: 0 14px; background: #4CAF82; color: #fff;
  border: none; border-radius: 8px; font-size: 14px; cursor: pointer; white-space: nowrap;
}
#search-btn:hover { background: #3a9e6f; }

#location-btn {
  height: 38px; width: 38px; border: 1.5px solid #ddd; border-radius: 8px;
  background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
#location-btn:hover { border-color: #4CAF82; }

/* 토글 버튼 */
.toggle-row {
  display: flex; gap: 6px;
}

.toggle-btn {
  flex: 1; height: 32px; border-radius: 20px; border: 1.5px solid #ddd;
  background: #fff; font-size: 13px; cursor: pointer; display: flex;
  align-items: center; justify-content: center; gap: 4px; color: #888;
  transition: all .15s;
}
.toggle-btn.on { color: #fff; border-color: transparent; }
.toggle-btn.on.playground { background: #4CAF82; }
.toggle-btn.on.kidscafe   { background: #FF8C42; }
.toggle-btn.on.restaurant { background: #5B8CFF; }

/* 지도 */
#map {
  position: absolute; top: 108px; left: 0; right: 0; bottom: 0;
}

/* 팝업 */
#popup {
  position: absolute; z-index: 20; background: #fff;
  border-radius: 12px; border: 1px solid #eee;
  box-shadow: 0 4px 20px rgba(0,0,0,0.12);
  padding: 14px 16px; width: 240px;
  display: none;
}
#popup .pop-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; color: #111; }
#popup .pop-addr { font-size: 12px; color: #888; margin-bottom: 6px; line-height: 1.4; }
#popup .pop-phone { font-size: 12px; color: #555; margin-bottom: 8px; }
#popup .pop-img { width: 100%; height: 100px; object-fit: cover; border-radius: 8px; margin-bottom: 8px; }
#popup .pop-link {
  display: block; text-align: center; padding: 7px;
  background: #f5f5f5; border-radius: 8px; font-size: 12px;
  color: #333; text-decoration: none;
}
#popup .pop-link:hover { background: #eee; }
#popup .pop-close {
  position: absolute; top: 10px; right: 12px;
  font-size: 18px; cursor: pointer; color: #aaa; background: none; border: none;
}
#popup .pop-badge {
  display: inline-block; font-size: 11px; padding: 2px 8px;
  border-radius: 10px; margin-bottom: 6px; font-weight: 500;
}
#popup .pop-nokids {
  font-size: 11px; color: #aaa; margin-top: 6px; line-height: 1.4;
}

/* 로딩 */
#loading {
  position: absolute; z-index: 30; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(255,255,255,0.92); border-radius: 12px;
  padding: 16px 24px; font-size: 14px; color: #555;
  display: none; border: 1px solid #eee;
}

/* 안내 */
#guide {
  position: absolute; z-index: 15; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  text-align: center; color: #aaa; pointer-events: none;
}
#guide .guide-icon { font-size: 40px; margin-bottom: 8px; }
#guide .guide-text { font-size: 14px; line-height: 1.6; }
</style>
</head>
<body>

<div id="topbar">
  <div class="search-row">
    <input id="search-input" type="text" placeholder="동네 검색 (예: 수원 영통, 마포구 합정)" />
    <button id="search-btn" onclick="searchArea()">검색</button>
    <button id="location-btn" onclick="useMyLocation()" title="현재 위치">📍</button>
  </div>
  <div class="toggle-row">
    <button class="toggle-btn playground on" onclick="toggleCategory('playground')">🛝 놀이터</button>
    <button class="toggle-btn kidscafe on" onclick="toggleCategory('kidscafe')">🏠 키즈카페</button>
    <button class="toggle-btn restaurant on" onclick="toggleCategory('restaurant')">🍽️ 식당</button>
  </div>
</div>

<div id="map"></div>

<div id="popup">
  <button class="pop-close" onclick="closePopup()">✕</button>
  <div id="popup-content"></div>
</div>

<div id="loading">검색 중...</div>

<div id="guide">
  <div class="guide-icon">🗺️</div>
  <div class="guide-text">동네를 검색하면<br>놀이터·키즈카페·식당이 한눈에!</div>
</div>

<script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=9ddafafd50b0d86a88eda2b9609d4567&libraries=services"></script>
<script>
const KAKAO_REST_KEY = '9ddafafd50b0d86a88eda2b9609d4567';

let map, ps;
let markers = { playground: [], kidscafe: [], restaurant: [] };
let active = { playground: true, kidscafe: true, restaurant: true };
let currentCenter = null;

const COLORS = {
  playground: '#4CAF82',
  kidscafe:   '#FF8C42',
  restaurant: '#5B8CFF'
};
const LABELS = {
  playground: '놀이터',
  kidscafe:   '키즈카페',
  restaurant: '식당'
};

window.onload = function() {
  map = new kakao.maps.Map(document.getElementById('map'), {
    center: new kakao.maps.LatLng(37.5665, 126.9780),
    level: 5
  });
  ps = new kakao.maps.services.Places();

  document.getElementById('search-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') searchArea();
  });
};

function searchArea() {
  const keyword = document.getElementById('search-input').value.trim();
  if (!keyword) return alert('동네 이름을 입력해주세요!');

  showLoading(true);
  ps.keywordSearch(keyword, function(data, status) {
    if (status === kakao.maps.services.Status.OK) {
      const lat = parseFloat(data[0].y);
      const lng = parseFloat(data[0].x);
      currentCenter = new kakao.maps.LatLng(lat, lng);
      map.setCenter(currentCenter);
      map.setLevel(5);
      document.getElementById('guide').style.display = 'none';
      loadAllMarkers(lat, lng);
    } else {
      showLoading(false);
      alert('검색 결과가 없어요. 다른 동네명으로 검색해보세요!');
    }
  });
}

function useMyLocation() {
  if (!navigator.geolocation) return alert('위치 정보를 지원하지 않는 브라우저예요.');
  showLoading(true);
  navigator.geolocation.getCurrentPosition(function(pos) {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;
    currentCenter = new kakao.maps.LatLng(lat, lng);
    map.setCenter(currentCenter);
    map.setLevel(5);
    document.getElementById('guide').style.display = 'none';
    loadAllMarkers(lat, lng);
  }, function() {
    showLoading(false);
    alert('위치 정보를 가져올 수 없어요.');
  });
}

function loadAllMarkers(lat, lng) {
  clearAllMarkers();
  closePopup();
  let done = 0;
  const total = Object.keys(active).filter(k => active[k]).length || 1;

  function checkDone() {
    done++;
    if (done >= total) showLoading(false);
  }

  if (active.playground) searchKakao('어린이놀이터', lat, lng, 'playground', checkDone);
  else checkDone();
  if (active.kidscafe) searchKakao('키즈카페', lat, lng, 'kidscafe', checkDone);
  else checkDone();
  if (active.restaurant) searchRestaurant(lat, lng, checkDone);
  else checkDone();
}

function searchKakao(keyword, lat, lng, type, cb) {
  ps.keywordSearch(keyword, function(data, status) {
    if (status === kakao.maps.services.Status.OK) {
      data.forEach(place => addMarker(place, type));
    }
    cb();
  }, {
    location: new kakao.maps.LatLng(lat, lng),
    radius: 1500,
    size: 15
  });
}

function searchRestaurant(lat, lng, cb) {
  ps.categorySearch('FD6', function(data, status) {
    if (status === kakao.maps.services.Status.OK) {
      data.forEach(place => {
        const rating = parseFloat(place.rating || 0);
        const reviewCnt = parseInt(place.review_cnt || 0);
        if (rating >= 4.0 && reviewCnt >= 50) {
          addMarker(place, 'restaurant');
        } else if (!place.rating) {
        }
      });
    }
    cb();
  }, {
    location: new kakao.maps.LatLng(lat, lng),
    radius: 1000,
    size: 15
  });
}

function addMarker(place, type) {
  const pos = new kakao.maps.LatLng(place.y, place.x);
  const color = COLORS[type];

  const content = `
    <div style="
      background:${color}; color:#fff; border-radius:20px;
      padding:4px 10px; font-size:12px; font-weight:600;
      white-space:nowrap; border:2px solid #fff;
      box-shadow:0 2px 6px rgba(0,0,0,0.2);
    ">${LABELS[type] === '놀이터' ? '🛝' : LABELS[type] === '키즈카페' ? '🏠' : '🍽️'} ${place.place_name}</div>
  `;

  const marker = new kakao.maps.CustomOverlay({
    position: pos,
    content: content,
    yAnchor: 1
  });
  marker.setMap(map);
  markers[type].push(marker);

  const el = marker.getContent();
  setTimeout(() => {
    const div = document.querySelector(`[data-place="${place.id}"]`) ||
      document.evaluate(`//div[contains(text(),'${place.place_name.substring(0,4)}')]`,
        document, null, XPathResult.FIRST_ORDERED_NODE_TYPE, null).singleNodeValue;
  }, 100);

  kakao.maps.event.addListener(marker, 'click', function() {
    showPopup(place, type, pos);
  });

  const markerEl = marker.cc || marker.Sa;
  if (markerEl) {
    markerEl.style.cursor = 'pointer';
    markerEl.addEventListener('click', () => showPopup(place, type, pos));
  }
}

function showPopup(place, type, pos) {
  const color = COLORS[type];
  const label = LABELS[type];
  let html = `
    <span class="pop-badge" style="background:${color}20;color:${color}">${label}</span>
    <div class="pop-name">${place.place_name}</div>
    <div class="pop-addr">${place.road_address_name || place.address_name}</div>
  `;
  if (place.phone) html += `<div class="pop-phone">📞 ${place.phone}</div>`;
  if (place.place_url) {
    html += `<a class="pop-link" href="${place.place_url}" target="_blank">카카오맵에서 보기 →</a>`;
  }
  if (type === 'restaurant') {
    html += `<div class="pop-nokids">⚠️ 노키즈존 여부는 직접 확인 후 방문하세요</div>`;
  }

  document.getElementById('popup-content').innerHTML = html;
  const popup = document.getElementById('popup');
  popup.style.display = 'block';

  const proj = map.getProjection();
  const point = proj.pointFromCoords(pos);
  popup.style.left = Math.min(point.x + 10, window.innerWidth - 260) + 'px';
  popup.style.top = Math.max(point.y - 180, 120) + 'px';
}

function closePopup() {
  document.getElementById('popup').style.display = 'none';
}

function toggleCategory(type) {
  active[type] = !active[type];
  const btn = document.querySelector(`.toggle-btn.${type}`);
  btn.classList.toggle('on', active[type]);

  if (active[type]) {
    markers[type].forEach(m => m.setMap(map));
  } else {
    markers[type].forEach(m => m.setMap(null));
  }

  if (active[type] && currentCenter) {
    const lat = currentCenter.getLat();
    const lng = currentCenter.getLng();
    markers[type].forEach(m => m.setMap(null));
    markers[type] = [];
    if (type === 'restaurant') searchRestaurant(lat, lng, () => {});
    else {
      const kw = type === 'playground' ? '어린이놀이터' : '키즈카페';
      searchKakao(kw, lat, lng, type, () => {});
    }
  }
}

function clearAllMarkers() {
  Object.keys(markers).forEach(type => {
    markers[type].forEach(m => m.setMap(null));
    markers[type] = [];
  });
}

function showLoading(show) {
  document.getElementById('loading').style.display = show ? 'block' : 'none';
}
</script>
</body>
</html>
